services:
  triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    image: omnivoice-triton:latest
    container_name: omnivoice-triton
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    volumes:
      - ./models:/models:ro
      - huggingface_cache:/root/.cache/huggingface
      - /mnt/hdd:/mnt/hdd
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/root/.cache/huggingface
      - REDIS_HOST=192.168.1.190
      - REDIS_PORT=6379
    command:
      - "tritonserver"
      - "--model-repository=/models"
      - "--strict-model-config=false"
      - "--log-verbose=1"
      - "--cache-config=local,size=1073741824"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    shm_size: 8g
    ulimits:
      memlock: -1
      stack: 67108864

volumes:
  huggingface_cache:
